<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/scrabble-collector/version2/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0c0c10" />
    <title>Hypercasual — prototype</title>
    <script type="module" crossorigin src="/scrabble-collector/version2/assets/index-vK4fcAc5.js"></script>
    <link rel="stylesheet" crossorigin href="/scrabble-collector/version2/assets/index-SQp_e9lx.css">
  </head>
  <body>
    <div id="app">
      <div id="game-viewport" aria-label="Game view">
        <div id="hud-hit-flash" class="hud-hit-flash" aria-hidden="true"></div>
        <div id="hud-power-tint" class="hud-power-tint" aria-hidden="true"></div>
        <div id="hud-power-timer" class="hud-power-timer hidden" aria-hidden="true"></div>
        <div id="hud-bootstrap" class="hud-bootstrap" aria-hidden="true">
          Collect!
        </div>
        <div id="hud-objective" class="hud-objective" aria-live="polite"></div>
        <div id="hud-idle-hint" class="hud-idle-hint hidden" aria-live="polite">
          Drag to move
        </div>
        <div id="hud-chase" class="hud-chase hidden" aria-live="polite">
          <div class="hud-chase-row">
            <span class="hud-chase-tag">TARGET</span>
            <span id="hud-chase-target" class="hud-chase-target"></span>
          </div>
          <div id="hud-chase-progress" class="hud-chase-progress"></div>
        </div>
        <div id="hud-chase-toast" class="chase-toast chase-toast--layer hidden" aria-live="polite">
          <div class="chase-toast-title">CHASE COMPLETE!</div>
          <div class="chase-toast-word"></div>
          <div class="chase-toast-bonus"></div>
        </div>
        <div id="hud-bottom" class="hud-bottom" aria-live="polite">
          <div id="hud-letters" hidden></div>
          <div id="hud-row">
            <span id="hud-carry">0 / 10</span>
            <span id="hud-carry-value" class="hud-carry-value" hidden title="Estimated payout if you deposit now">≈ $0</span>
            <span id="hud-money">$0</span>
          </div>
          <div id="hud-spawn" class="hud-spawn"></div>
        </div>
        <div id="hud-overload" class="hud-overload hidden" aria-live="polite">
          <div class="hud-overload-label">OVERLOAD</div>
          <div class="hud-overload-amount"></div>
        </div>
        <div id="hud-deposit-toast" class="deposit-toast hidden" aria-live="polite">
          <div class="deposit-amount"></div>
          <div class="deposit-word"></div>
          <div class="deposit-hint"></div>
        </div>
      </div>
    </div>
  </body>
</html>
