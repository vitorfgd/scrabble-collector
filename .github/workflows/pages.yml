# Deploy Vite builds to subfolders on gh-pages so both versions coexist:
#   https://<user>.github.io/scrabble-collector/version1/
#   https://<user>.github.io/scrabble-collector/version2/
#
# - Push to `main`  → build with base /scrabble-collector/version1/ → deploy to version1/
# - Push to `version2` → build with base /scrabble-collector/version2/ → deploy to version2/
#
# Repo Settings → Pages → Source: Deploy from branch → gh-pages / (root)
# (Switch from “GitHub Actions” artifact deploy if you used that before.)

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, version2]

permissions:
  contents: write

concurrency:
  group: pages-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set BASE_PATH and destination folder
        id: paths
        run: |
          REPO="${{ github.event.repository.name }}"
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "base=/${REPO}/version1/" >> $GITHUB_OUTPUT
            echo "dest=version1" >> $GITHUB_OUTPUT
          else
            echo "base=/${REPO}/version2/" >> $GITHUB_OUTPUT
            echo "dest=version2" >> $GITHUB_OUTPUT
          fi

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          BASE_PATH: ${{ steps.paths.outputs.base }}

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: ${{ steps.paths.outputs.dest }}
          keep_files: true
