# Deploy Vite builds to subfolders on gh-pages so all versions coexist, e.g.:
#   https://<user>.github.io/<repo>/version1/
#   https://<user>.github.io/<repo>/version2/
#   https://<user>.github.io/<repo>/version7-simplified/
#
# - Push to `main`              → base /repo/version1/           → deploy to version1/
# - Push to `version2`         → base /repo/version2/           → deploy to version2/
# - Push to `version7-simplfied` → base /repo/version7-simplified/ → deploy to version7-simplified/
#
# Repo Settings → Pages → Source: Deploy from branch → gh-pages / (root)
# (Switch from “GitHub Actions” artifact deploy if you used that before.)

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, version2, version7-simplfied]

permissions:
  contents: write

concurrency:
  group: pages-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set BASE_PATH and destination folder
        id: paths
        run: |
          REPO="${{ github.event.repository.name }}"
          REF="${{ github.ref_name }}"
          if [ "$REF" = "main" ]; then
            echo "base=/${REPO}/version1/" >> $GITHUB_OUTPUT
            echo "dest=version1" >> $GITHUB_OUTPUT
          elif [ "$REF" = "version2" ]; then
            echo "base=/${REPO}/version2/" >> $GITHUB_OUTPUT
            echo "dest=version2" >> $GITHUB_OUTPUT
          elif [ "$REF" = "version7-simplfied" ]; then
            echo "base=/${REPO}/version7-simplified/" >> $GITHUB_OUTPUT
            echo "dest=version7-simplified" >> $GITHUB_OUTPUT
          else
            echo "Branch not configured for Pages deploy: $REF" >&2
            exit 1
          fi

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          BASE_PATH: ${{ steps.paths.outputs.base }}

      - name: Deploy version folder to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: ${{ steps.paths.outputs.dest }}
          keep_files: true

      - name: Deploy site root (index + .nojekyll)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./.github/pages-root
          destination_dir: .
          keep_files: true
